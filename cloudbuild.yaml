# Google Cloud Build — builds and deploys to Cloud Run
# Usage: gcloud builds submit --config cloudbuild.yaml .
#
# Required substitutions (set in Cloud Build trigger or pass with --substitutions):
#   _REGION          e.g. europe-west1
#   _SERVICE_NAME    e.g. hypnotherapistdotie
#   _PROJECT_ID      your GCP project ID

steps:
  # Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - '--build-arg=NEXT_PUBLIC_SANITY_PROJECT_ID=$_NEXT_PUBLIC_SANITY_PROJECT_ID'
      - '--build-arg=NEXT_PUBLIC_SANITY_DATASET=production'
      - '--build-arg=NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY=$_NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY'
      - '--build-arg=NEXT_PUBLIC_FIREBASE_PROJECT_ID=$_PROJECT_ID'
      - '--build-arg=NEXT_PUBLIC_SITE_URL=$_SITE_URL'
      - '-t'
      - 'gcr.io/$PROJECT_ID/$_SERVICE_NAME:$COMMIT_SHA'
      - '.'

  # Push to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/$_SERVICE_NAME:$COMMIT_SHA']

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - '$_SERVICE_NAME'
      - '--image=gcr.io/$PROJECT_ID/$_SERVICE_NAME:$COMMIT_SHA'
      - '--region=$_REGION'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=8080'
      - '--min-instances=0'
      - '--max-instances=10'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--service-account=922991726920-compute@developer.gserviceaccount.com'
      # Secrets from Secret Manager (no service account JSON needed — Cloud Run uses ADC)
      - '--set-secrets=STRIPE_SECRET_KEY=stripe-secret-key:latest,STRIPE_WEBHOOK_SECRET=stripe-webhook-secret:latest,SANITY_API_TOKEN=sanity-api-token:latest,RESEND_API_KEY=resend-api-key:latest,ADMIN_EMAIL=admin-email:latest,ADMIN_PASSWORD=admin-password:latest,ADMIN_JWT_SECRET=admin-jwt-secret:latest'
      - '--set-env-vars=NEXT_PUBLIC_SANITY_PROJECT_ID=$_NEXT_PUBLIC_SANITY_PROJECT_ID,NEXT_PUBLIC_SANITY_DATASET=production,NEXT_PUBLIC_FIREBASE_PROJECT_ID=$_PROJECT_ID,FIRESTORE_DATABASE_ID=$_FIRESTORE_DATABASE_ID,GCS_BUCKET_NAME=$_GCS_BUCKET_NAME,CONTACT_EMAIL_TO=$_CONTACT_EMAIL_TO,NEXT_PUBLIC_SITE_URL=$_SITE_URL'
      # The Cloud Run service account must have:
      #   roles/datastore.user       (Firestore read/write)
      #   roles/storage.objectViewer (GCS signed URLs)

images:
  - 'gcr.io/$PROJECT_ID/$_SERVICE_NAME:$COMMIT_SHA'

substitutions:
  _REGION: europe-west1
  _SERVICE_NAME: hypnotherapistdotie
  _SITE_URL: https://hypnotherapy.ie
  _CONTACT_EMAIL_TO: jwall@hypnotherapist.ie
  _NEXT_PUBLIC_SANITY_PROJECT_ID: '2lhjnuav'
  _NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: 'pk_test_51Ls6wBB2cRB2ObhZrYTxdykhjWL5rzx6lrnBmAdNGhTrd9ynUuOKrDrvsKBDrgY6y2luqpMQK5tpfhOEE7MGC9L500JDUO0unb'
  _GCS_BUCKET_NAME: 'hypnotherapy-ie-audio'
  _FIRESTORE_DATABASE_ID: '(default)'

options:
  logging: CLOUD_LOGGING_ONLY
